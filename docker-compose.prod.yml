# Production deployment for Aatos Custom Coolify
# Full stack: Coolify + Postgres + Redis + Soketi
name: coolify-production

services:
  postgres:
    image: postgres:15-alpine
    container_name: coolify-postgres
    restart: always
    networks:
      - coolify
    volumes:
      - coolify-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=coolify
      - POSTGRES_PASSWORD=gsDgJ6a5qiZvSmpnZ6AlFbSi1U//WFmiTYaAba5JmXM=
      - POSTGRES_DB=coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coolify"]
      interval: 10s
      retries: 10
      timeout: 5s
    labels:
      - "coolify.managed=true"
      - "coolify.type=infrastructure"

  redis:
    image: redis:7-alpine
    container_name: coolify-redis
    restart: always
    networks:
      - coolify
    volumes:
      - coolify-redis:/data
    command: redis-server --requirepass PWlQXTQdre/zePLdHvDRPLMSiudj+hnKykOU4ztKM6A=
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a PWlQXTQdre/zePLdHvDRPLMSiudj+hnKykOU4ztKM6A= ping"]
      interval: 10s
      retries: 10
      timeout: 5s
    labels:
      - "coolify.managed=true"
      - "coolify.type=infrastructure"

  soketi:
    image: quay.io/soketi/soketi:latest
    container_name: coolify-soketi
    restart: always
    networks:
      - coolify
    environment:
      - SOKETI_DEFAULT_APP_ID=a851b338ffd85e11409cc0e0b261773f7f81ba3889e66a513af380fe8ffb769c
      - SOKETI_DEFAULT_APP_KEY=1472914c9f8f110beb42d9f5a6796d4b4f114384c7bf76ec1920b8ada6079a4c
      - SOKETI_DEFAULT_APP_SECRET=d51431fea9b5b03fd3be031cf73c25e64cee69e02ca96cece47969d3ddd6d09d
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const c=net.connect(6001,'127.0.0.1');c.on('error',()=>process.exit(1));c.on('connect',()=>process.exit(0));setTimeout(()=>process.exit(1),2000)\""]
      interval: 15s
      retries: 3
      timeout: 10s
    labels:
      - "coolify.managed=true"
      - "coolify.type=infrastructure"

  coolify:
    image: "ghcr.io/aatos-git-collab/coolify-custom:v4.0.0-ai-smart-panel-v2"
    container_name: coolify
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coolify
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8080"
    volumes:
      - type: bind
        source: /data/coolify/source/.env
        target: /var/www/html/.env
        read_only: true
      - /data/coolify/ssh:/var/www/html/storage/app/ssh
      - /data/coolify/applications:/var/www/html/storage/app/applications
      - /data/coolify/databases:/var/www/html/storage/app/databases
      - /data/coolify/services:/var/www/html/storage/app/services
      - /data/coolify/backups:/var/www/html/storage/app/backups
      - /data/coolify/ssl:/var/www/html/storage/ssl
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - PHP_MEMORY_LIMIT=512M
      - PHP_FPM_PM_CONTROL=dynamic
      - PHP_FPM_PM_START_SERVERS=2
      - PHP_FPM_PM_MIN_SPARE_SERVERS=2
      - PHP_FPM_PM_MAX_SPARE_SERVERS=20
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/api/health || wget -qO- http://127.0.0.1:8080/api/health || exit 1"]
      interval: 10s
      retries: 15
      timeout: 5s
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.coolify.entrypoints=http,https"
      - "traefik.http.routers.coolify.rule=Host(`coolify.dash.nexeraa.io`)"
      - "traefik.http.routers.coolify.tls=true"
      - "traefik.http.services.coolify.loadbalancer.server.port=8080"
      - "coolify.managed=true"
      - "coolify.type=application"

networks:
  coolify:
    external: true

volumes:
  coolify-db:
    external: true
  coolify-redis:
    external: true
