## docker-compose.prod.yml - Production with Pre-built Custom Image
##
## For production deployments using our CUSTOM built image.
## 
## BEFORE using this:
##   1. Build the image: cd /root/AI-SmartPanel/coolify && make build
##   2. Or: docker build -t ghcr.io/aatos-git-collab/coolify-custom:latest .
##
## USAGE:
##   docker-compose -f docker-compose.prod.yml up -d
##
## Environment Variables:
##   REGISTRY_URL - Default: ghcr.io/aatos-git-collab
##   IMAGE_NAME   - Default: coolify-custom
##   LATEST_IMAGE - Default: latest
##   APP_PORT     - Default: 8000

services:
  coolify:
    image: "${REGISTRY_URL:-ghcr.io/aatos-git-collab}/coolify-custom:${LATEST_IMAGE:-latest}"
    volumes:
      - type: bind
        source: /data/coolify/source/.env
        target: /var/www/html/.env
        read_only: true
      - /data/coolify/ssh:/var/www/html/storage/app/ssh
      - /data/coolify/applications:/var/www/html/storage/app/applications
      - /data/coolify/databases:/var/www/html/storage/app/databases
      - /data/coolify/services:/var/www/html/storage/app/services
      - /data/coolify/backups:/var/www/html/storage/app/backups
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - APP_ENV=${APP_ENV:-production}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-256M}
      - PHP_FPM_PM_CONTROL=${PHP_FPM_PM_CONTROL:-dynamic}
      - PHP_FPM_PM_START_SERVERS=${PHP_FPM_PM_START_SERVERS:-1}
      - PHP_FPM_PM_MIN_SPARE_SERVERS=${PHP_FPM_PM_MIN_SPARE_SERVERS:-1}
      - PHP_FPM_PM_MAX_SPARE_SERVERS=${PHP_FPM_PM_MAX_SPARE_SERVERS:-10}
    env_file:
      - /data/coolify/source/.env
    ports:
      - "${APP_PORT:-8000}:8080"
    expose:
      - "${APP_PORT:-8000}"
    healthcheck:
      test: curl --fail http://127.0.0.1:8080/api/health || exit 1
      interval: 5s
      retries: 10
      timeout: 2s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      soketi:
        condition: service_healthy
  postgres:
    image: postgres:15-alpine
    volumes:
      - coolify-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_DATABASE:-coolify}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}", "-d", "${DB_DATABASE:-coolify}" ]
      interval: 5s
      retries: 10
      timeout: 2s
  redis:
    image: redis:7-alpine
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    volumes:
      - coolify-redis:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      retries: 10
  soketi:
    image: ghcr.io/coollabsio/soketi:latest
    container_name: coolify-realtime
    restart: always
    networks:
      - coolify
    environment:
      SOKETI_DEFAULT_APP_ID: "${PUSHER_APP_ID:-coolify}"
      SOKETI_DEFAULT_APP_KEY: "${PUSHER_APP_KEY:-coolify}"
      SOKETI_DEFAULT_APP_SECRET: "${PUSHER_APP_SECRET:-coolify}"
      SOKETI_PUSHER_PORT: "${PUSHER_PORT:-6001}"
      SOKETI_PUSHER_SCHEME: "${PUSHER_SCHEME:-http}"
      SOKETI_PUSHER_HOST: "${PUSHER_HOST:-127.0.0.1}"
      SOKETI_DEBUG: "false"

volumes:
  coolify-db:
    external: false
  coolify-redis:
    external: false

networks:
  coolify:
    name: coolify
    external: false
