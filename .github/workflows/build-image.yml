name: Build and Push Custom Docker Image

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/coolify-custom
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run syntax checks
        run: |
          find app -name '*.php' -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true
      
      - name: Check custom files exist
        run: |
          MISSING=""
          for f in app/Jobs/AiAutoFixJob.php app/Jobs/AiLogMonitorJob.php app/Services/AiService.php; do
            [ ! -f "$f" ] && MISSING="$MISSING $f"
          done
          [ -n "$MISSING" ] && echo "Missing:$MISSING" && exit 1 || echo "All custom files present"
