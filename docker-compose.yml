## docker-compose.yml - BUILD from local source
##
## Use this when developing or wanting CUSTOM features (AI features).
## Builds Docker image from local ./docker/production/Dockerfile
##
## Usage:
##   docker-compose up -d --build    # Build and start
##   docker-compose build && docker-compose up -d  # Build then start
##
## This uses LOCAL source code - no external image registry needed!

services:
    coolify:
        build:
            context: .
            dockerfile: docker/production/Dockerfile
        container_name: coolify
        restart: always
        working_dir: /var/www/html
        extra_hosts:
            - host.docker.internal:host-gateway
        networks:
            - coolify
        depends_on:
            - postgres
            - redis
            - soketi
    postgres:
        image: postgres:15-alpine
        container_name: coolify-db
        restart: always
        networks:
            - coolify
    redis:
        image: redis:7-alpine
        container_name: coolify-redis
        restart: always
        networks:
            - coolify
    soketi:
        container_name: coolify-realtime
        extra_hosts:
            - host.docker.internal:host-gateway
        restart: always
        networks:
            - coolify
networks:
    coolify:
        name: coolify
        driver: bridge
        external: false
